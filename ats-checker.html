<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ATS Resume Checker | Eduskillpath</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 text-slate-900">

<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="font-extrabold text-indigo-600">Eduskillpath</h1>
  <a href="index.html" class="text-sm font-semibold text-slate-600">
    ← Back to Home
  </a>
</header>

<section class="max-w-4xl mx-auto mt-16 p-6">
  <h2 class="text-4xl font-extrabold text-center">
    Simple ATS Resume Checker
  </h2>
  <p class="text-center text-slate-600 mt-3">
    Basic ATS compatibility check (no job description)
  </p>

  <div class="bg-white mt-10 p-6 rounded-xl shadow space-y-6">

    <input type="file" id="resumeFile"
           accept=".pdf,.doc,.docx,.txt"
           class="w-full border p-3 rounded">

    <button onclick="runATSCheck()"
            class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">
      Check ATS Score
    </button>

    <div id="result" class="hidden mt-8">
      <h3 class="text-2xl font-extrabold">
        ATS Score: <span id="score" class="text-indigo-600">0</span>/100
      </h3>

      <ul id="feedback" class="mt-4 space-y-2 text-sm text-slate-600"></ul>
    </div>

  </div>
</section>

<script>
function runATSCheck() {
  const file = document.getElementById("resumeFile").files[0];
  if (!file) {
    alert("Please upload a resume");
    return;
  }

  const reader = new FileReader();
  reader.onload = function () {
    const text = reader.result.toLowerCase();

    let score = 0;
    let feedback = [];

    /* ===== SECTION CHECK (30) ===== */
    const sections = ["skills", "experience", "education"];
    let sectionHits = sections.filter(s => text.includes(s)).length;
    score += sectionHits * 10;

    if (sectionHits < 3) {
      feedback.push("Missing or unclear standard sections (Skills, Experience, Education).");
    } else {
      feedback.push("All standard ATS sections detected.");
    }

    /* ===== SKILLS CHECK (20) ===== */
    const skillWords = ["excel", "sql", "python", "analysis", "management", "communication"];
    let skillHits = skillWords.filter(s => text.includes(s)).length;
    score += Math.min(skillHits * 3, 20);

    if (skillHits < 3) {
      feedback.push("Skills section appears weak or too generic.");
    }

    /* ===== EXPERIENCE & DATES (20) ===== */
    const yearMatches = text.match(/\b(19|20)\d{2}\b/g) || [];
    if (yearMatches.length >= 2) {
      score += 20;
      feedback.push("Experience timeline appears clear.");
    } else {
      score += 10;
      feedback.push("Experience dates may be missing or unclear.");
    }

    /* ===== ACTION VERBS (15) ===== */
    const actionVerbs = ["led", "built", "managed", "designed", "improved", "developed"];
    let verbHits = actionVerbs.filter(v => text.includes(v)).length;
    score += Math.min(verbHits * 3, 15);

    if (verbHits < 2) {
      feedback.push("Use stronger action verbs to describe achievements.");
    }

    /* ===== FORMATTING (15) ===== */
    if (file.name.endsWith(".pdf") || file.name.endsWith(".docx")) {
      score += 15;
      feedback.push("Resume format is ATS-friendly.");
    } else {
      feedback.push("Use PDF or DOCX format for best ATS results.");
    }

    if (score > 100) score = 100;

    document.getElementById("score").innerText = score;

    const ul = document.getElementById("feedback");
    ul.innerHTML = "";
    feedback.forEach(f => {
      const li = document.createElement("li");
      li.textContent = "• " + f;
      ul.appendChild(li);
    });

    document.getElementById("result").classList.remove("hidden");
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
