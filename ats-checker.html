<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eduskillpath – AI ATS Resume Checker</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<!-- PDF + DOCX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>

<style>
* { font-family: 'Inter', sans-serif; }
body { background: radial-gradient(circle at top left, #eef2ff, #ffffff 60%); }
.glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(14px); border:1px solid rgba(0,0,0,0.05); }
.gradient { background: linear-gradient(90deg,#4f46e5,#9333ea); }
.gradient-text { background: linear-gradient(90deg,#4f46e5,#9333ea); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
</style>
</head>
<body class="text-gray-800">

<!-- HEADER -->
<header class="sticky top-0 z-50 glass">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <h1 class="text-xl font-extrabold gradient-text">Eduskillpath ATS</h1>
    <button class="gradient text-white px-5 py-2 rounded-xl font-semibold">Go Pro</button>
  </div>
</header>

<!-- HERO -->
<section class="max-w-6xl mx-auto px-6 py-16">
  <h2 class="text-5xl font-black mb-4">Beat the ATS. <span class="gradient-text">Get Interviews.</span></h2>
  <p class="text-lg text-gray-600 mb-8">AI-powered ATS checker with real keyword scoring & resume rewriting.</p>

  <div class="glass rounded-3xl p-8 space-y-6">
    <textarea id="jobDesc" rows="4" placeholder="Paste Job Description" class="w-full border rounded-xl p-4"></textarea>

    <input type="file" id="resumeFile" accept=".pdf,.docx,.txt" class="block w-full" />

    <button onclick="runATS()" class="w-full gradient text-white py-4 rounded-2xl font-bold text-lg">Analyze Resume</button>
  </div>
</section>

<!-- LOADING -->
<section id="loading" class="hidden text-center py-10">
  <i class="fa-solid fa-brain text-4xl text-indigo-600 animate-pulse"></i>
  <p class="mt-3">Analyzing with ATS engines…</p>
</section>

<!-- RESULTS -->
<section id="results" class="hidden max-w-6xl mx-auto px-6 pb-20 space-y-10">

  <!-- SCORE -->
  <div class="glass rounded-3xl p-8 flex items-center gap-8">
    <div class="text-6xl font-black gradient-text" id="score">0</div>
    <div>
      <p class="font-semibold">ATS Score</p>
      <p class="text-gray-500">Target 80+ for interviews</p>
    </div>
  </div>

  <!-- KEYWORDS -->
  <div class="grid md:grid-cols-2 gap-6">
    <div class="glass p-6 rounded-2xl">
      <h3 class="font-bold text-green-600 mb-3">Found Keywords</h3>
      <div id="found" class="flex flex-wrap gap-2"></div>
    </div>
    <div class="glass p-6 rounded-2xl">
      <h3 class="font-bold text-red-600 mb-3">Missing Keywords</h3>
      <div id="missing" class="flex flex-wrap gap-2"></div>
    </div>
  </div>

  <!-- AI REWRITE -->
  <div class="glass p-6 rounded-2xl">
    <h3 class="font-bold mb-4">AI Resume Rewrite (Pro Preview)</h3>
    <div class="grid md:grid-cols-2 gap-4">
      <div class="p-4 bg-gray-50 rounded-xl">
        <p class="text-sm text-gray-500">Before</p>
        <p id="beforeText"></p>
      </div>
      <div class="p-4 bg-indigo-50 rounded-xl">
        <p class="text-sm text-gray-500">After (AI Optimized)</p>
        <p id="afterText"></p>
      </div>
    </div>
  </div>
</section>

<script>
async function extractText(file) {
  const ext = file.name.split('.').pop();
  if (ext === 'txt') return await file.text();
  if (ext === 'pdf') {
    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const c = await page.getTextContent();
      text += c.items.map(i => i.str).join(' ');
    }
    return text;
  }
  if (ext === 'docx') {
    const r = await mammoth.extractRawText({ arrayBuffer: await file.arrayBuffer() });
    return r.value;
  }
}

function analyze(resume, jd) {
  const jdWords = [...new Set(jd.toLowerCase().match(/\b[a-z]{4,}\b/g))];
  const found = jdWords.filter(w => resume.toLowerCase().includes(w));
  const missing = jdWords.filter(w => !resume.toLowerCase().includes(w));
  const score = Math.min(100, Math.round((found.length / jdWords.length) * 100));
  return { score, found, missing };
}

function fakeAIRewrite(text) {
  return text.replace(/responsible for/gi, 'Led and delivered measurable results in');
}

async function runATS() {
  const file = document.getElementById('resumeFile').files[0];
  const jd = document.getElementById('jobDesc').value;
  if (!file || !jd) return alert('Upload resume & job description');

  document.getElementById('loading').classList.remove('hidden');
  const resumeText = await extractText(file);
  const r = analyze(resumeText, jd);

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  document.getElementById('score').innerText = r.score;

  document.getElementById('found').innerHTML = r.found.map(k => `<span class='px-2 py-1 bg-green-100 rounded'>${k}</span>`).join('');
  document.getElementById('missing').innerHTML = r.missing.map(k => `<span class='px-2 py-1 bg-red-100 rounded'>${k}</span>`).join('');

  document.getElementById('beforeText').innerText = resumeText.slice(0,300);
  document.getElementById('afterText').innerText = fakeAIRewrite(resumeText.slice(0,300));
}
</script>

</body>
</html>
